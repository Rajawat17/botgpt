version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./botgpt.db
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - ./botgpt.db:/app/botgpt.db
    restart: unless-stopped

