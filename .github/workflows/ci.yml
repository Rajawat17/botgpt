name: BOT GPT CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Test ──────────────────────────────────────────────────────────────
  test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-asyncio httpx

      - name: Lint with flake8
        run: |
          flake8 app/ tests/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --exclude=__pycache__,.venv

      - name: Run unit tests
        env:
          GROQ_API_KEY: ""          # empty → mock responses used in tests
          DATABASE_URL: "sqlite:///./test_botgpt.db"
        run: |
          pytest tests/ -v --tb=short

  # ── Docker Build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false        # set to true + add registry secrets to deploy
          tags: botgpt-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── (Optional) Deploy to fly.io / Render / Railway ───────────────────────────
